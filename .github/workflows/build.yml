name: Build Cross-Platform Binaries

on:
  push:
    branches: 
      - main
      - yaarscript-binaries
  pull_request:
    branches: 
      - main
      - yaarscript-binaries

jobs:
  build:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: yaar-linux
            target: x86_64-unknown-linux-gnu
            binary_path: target/x86_64-unknown-linux-gnu/release/compiler
          - os: windows-latest
            artifact_name: yaar-windows.exe
            target: x86_64-pc-windows-msvc
            binary_path: target/x86_64-pc-windows-msvc/release/compiler.exe
          - os: macos-latest
            artifact_name: yaar-macos
            target: x86_64-apple-darwin
            binary_path: target/x86_64-apple-darwin/release/compiler

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build Release
        run: cargo build --release --target ${{ matrix.target }}

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.binary_path }}
          if-no-files-found: error